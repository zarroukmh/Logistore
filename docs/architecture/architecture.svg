<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860">
  <defs>
    <style>
      .box { fill:#f7f9fc; stroke:#1f2937; stroke-width:2; rx:10; ry:10; }
      .title { font: 700 16px sans-serif; fill:#111827; }
      .txt { font: 13px sans-serif; fill:#111827; }
      .arrow { stroke:#111827; stroke-width:2; fill:none; marker-end:url(#m); }
      .dash { stroke-dasharray:7 6; }
      .group { fill:#ffffff; stroke:#6b7280; stroke-width:2; rx:12; ry:12; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Groups -->
  <rect class="group" x="30" y="20" width="300" height="190"/>
  <text class="title" x="45" y="45">Sources CSV</text>

  <rect class="group" x="360" y="20" width="420" height="360"/>
  <text class="title" x="375" y="45">Airflow Orchestration</text>

  <rect class="group" x="820" y="20" width="300" height="360"/>
  <text class="title" x="835" y="45">PostgreSQL (opérationnel)</text>

  <rect class="group" x="1150" y="20" width="320" height="520"/>
  <text class="title" x="1165" y="45">Fichiers (analytique + rapports)</text>

  <!-- Source boxes -->
  <rect class="box" x="50" y="70" width="260" height="55"/>
  <text class="txt" x="65" y="102">CATALOGUE CSV (/data/inbox/catalogue)</text>

  <rect class="box" x="50" y="145" width="260" height="55"/>
  <text class="txt" x="65" y="177">MOUVEMENTS CSV (/data/inbox/movements)</text>

  <!-- DAG boxes -->
  <rect class="box" x="390" y="70" width="360" height="60"/>
  <text class="txt" x="405" y="105">DAG1 ingest_catalogue (validate V1/V2 + UPSERT)</text>

  <rect class="box" x="390" y="155" width="360" height="60"/>
  <text class="txt" x="405" y="190">DAG2 ingest_movements (validate + routing unknown_sku)</text>

  <rect class="box" x="390" y="240" width="360" height="60"/>
  <text class="txt" x="405" y="275">DAG3 inventory_analytics (DuckDB KPI stock)</text>

  <rect class="box" x="390" y="325" width="360" height="60"/>
  <text class="txt" x="405" y="360">DAG4 replay_rejected_movements (manuel)</text>

  <!-- PG boxes -->
  <rect class="box" x="845" y="80" width="250" height="55"/>
  <text class="txt" x="860" y="113">products</text>

  <rect class="box" x="845" y="165" width="250" height="55"/>
  <text class="txt" x="860" y="198">movements</text>

  <rect class="box" x="845" y="250" width="250" height="70"/>
  <text class="txt" x="860" y="282">rejected_movements (DLQ)</text>
  <text class="txt" x="860" y="302">status: PENDING / REPLAYED</text>

  <!-- File boxes -->
  <rect class="box" x="1175" y="80" width="270" height="55"/>
  <text class="txt" x="1190" y="113">catalogue_snapshot.parquet</text>

  <rect class="box" x="1175" y="155" width="270" height="55"/>
  <text class="txt" x="1190" y="188">movements_history.parquet</text>

  <rect class="box" x="1175" y="230" width="270" height="55"/>
  <text class="txt" x="1190" y="263">inventory_report_*.csv</text>

  <rect class="box" x="1175" y="305" width="270" height="55"/>
  <text class="txt" x="1190" y="338">movements_rejections_*.json</text>

  <rect class="box" x="1175" y="380" width="270" height="55"/>
  <text class="txt" x="1190" y="413">replay_report_*.json</text>

  <!-- Contract notes -->
  <rect class="box" x="390" y="430" width="360" height="90"/>
  <text class="txt" x="405" y="460">Contrats d'interface Pydantic</text>
  <text class="txt" x="405" y="482">- CatalogueRecordV1 / V2</text>
  <text class="txt" x="405" y="504">- MovementRecordV1</text>

  <!-- Arrows -->
  <line class="arrow" x1="310" y1="97" x2="390" y2="97"/>
  <line class="arrow" x1="310" y1="172" x2="390" y2="185"/>

  <line class="arrow" x1="750" y1="100" x2="845" y2="108"/>
  <line class="arrow" x1="750" y1="100" x2="1175" y2="108"/>

  <line class="arrow" x1="750" y1="185" x2="845" y2="192"/>
  <line class="arrow" x1="750" y1="185" x2="845" y2="285"/>
  <line class="arrow" x1="750" y1="185" x2="1175" y2="183"/>
  <line class="arrow" x1="750" y1="185" x2="1175" y2="333"/>

  <line class="arrow" x1="1175" y1="183" x2="750" y2="270"/>
  <line class="arrow" x1="1175" y1="108" x2="750" y2="270"/>
  <line class="arrow" x1="750" y1="270" x2="1175" y2="258"/>

  <line class="arrow" x1="845" y1="285" x2="750" y2="355"/>
  <line class="arrow" x1="845" y1="108" x2="750" y2="355"/>
  <line class="arrow" x1="750" y1="355" x2="845" y2="192"/>
  <line class="arrow" x1="750" y1="355" x2="845" y2="285"/>
  <line class="arrow" x1="750" y1="355" x2="1175" y2="408"/>

  <!-- Dataset API dashed triggers -->
  <line class="arrow dash" x1="570" y1="130" x2="570" y2="155"/>
  <text class="txt" x="580" y="148">Dataset API trigger</text>

  <line class="arrow dash" x1="570" y1="215" x2="570" y2="240"/>
  <text class="txt" x="580" y="233">Dataset API trigger</text>
</svg>
